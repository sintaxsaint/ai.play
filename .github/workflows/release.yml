name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install pyinstaller scikit-learn flask requests

      - name: Install NSIS
        run: choco install nsis -y
        shell: powershell

      - name: Build exe with PyInstaller
        run: |
          cd python
          pyinstaller --onedir --name aip `
            --hidden-import=wave `
            --hidden-import=struct `
            --hidden-import=smtplib `
            --hidden-import=email.mime.text `
            --hidden-import=email.mime.multipart `
            --hidden-import=email.mime.base `
            --hidden-import=email.encoders `
            --hidden-import=http.server `
            --hidden-import=webbrowser `
            --hidden-import=uuid `
            --hidden-import=urllib.error `
            --add-data "lexer.py;." `
            --add-data "parser.py;." `
            --add-data "ast_nodes.py;." `
            --add-data "interpreter.py;." `
            --add-data "runtime.py;." `
            --add-data "format_detector.py;." `
            --add-data "memory_engine.py;." `
            --add-data "skills_engine.py;." `
            --add-data "module_engine.py;." `
            --add-data "user_memory.py;." `
            --add-data "server.py;." `
            --add-data "ui_server.py;." `
            --add-data "intent_engine.py;." `
            --add-data "voice_engine.py;." `
            --add-data "video_engine.py;." `
            --add-data "notify_engine.py;." `
            --add-data "vision_trainer.py;." `
            --add-data "ai_yes.py;." `
            --add-data "call_handler.py;." `
            --add-data "admin_engine.py;." `
            --add-data "mcp_engine.py;." `
            --add-data "sandbox_engine.py;." `
            --collect-all sklearn `
            --icon=aip.ico `
            aiplay.py
        shell: powershell

      - name: Build installer with NSIS
        run: |
          cd python
          & "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi
        shell: powershell

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: python/aiplay-setup.exe

  release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Delete existing latest release
        run: gh release delete latest --yes || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: |
            Built automatically from the latest commit on main.

            **Windows:** Download `aiplay-setup.exe`
            **Linux/Mac:** `curl -sSL https://raw.githubusercontent.com/sintaxsaint/ai.play/main/install.sh | bash`
          files: |
            windows-installer/aiplay-setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
